allow-branch = ["main"]
publish = false
push = true
tag = true
tag-name = "v{{version}}"
tag-message = "v{{version}}"
pre-release-commit-message = "chore(release): {{version}}"

[[pre-release-replacements]]
file = "flake.nix"
search = 'version = "[^"]*"'
replace = 'version = "{{version}}"'

[[pre-release-replacements]]
file = "CHANGELOG.md"
search = "## \\[Unreleased\\]"
replace = """
## [Unreleased]

## [{{version}}] - {{date}}"""
exactly = 1
